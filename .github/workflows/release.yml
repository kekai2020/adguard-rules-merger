# GitHub Actions Workflow for Daily Release
# Creates a daily release with merged rules

name: Daily Release

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create output directory
      run: mkdir -p output

    - name: Generate merged rules
      id: generate
      run: |
        python3 << 'EOF'
        from merger import RuleEngine, MergeReporter
        from config_loader import load_sources_config
        from datetime import datetime
        import os
        
        engine = RuleEngine(timeout=60, max_workers=10)
        
        try:
            sources = load_sources_config('config/sources.yaml')
            print(f"Loaded {len(sources)} sources from config")
        except Exception as e:
            print(f"Failed to load config: {e}")
            sources = [
                'https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Base/filter.txt',
                'https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_3_Spyware/filter.txt'
            ]
            print(f"Using fallback sources: {len(sources)}")
        
        print(f"Merging {len(sources)} sources...")
        
        # Use new API with stats and conflict detection
        result = engine.merge(sources, return_stats=True, detect_conflicts=True, concurrent_parse=True)
        rules = result['rules']
        stats = result['stats']
        
        print(f"Merged {stats['total_before']} -> {len(rules)} rules")
        print(f"Deduplication rate: {stats['dedup_rate']:.1f}%")
        print(f"Processing time: {stats['elapsed_time']:.2f}s")
        print(f"Conflicts detected: {stats.get('conflict_count', 0)}")
        
        output_file = 'output/merged_rules.txt'
        with open(output_file, 'w', encoding='utf-8') as f:
            f.write(f"! Merged AdGuard Filter Rules\n")
            f.write(f"! Generated: {datetime.utcnow().isoformat()}Z\n")
            f.write(f"! Sources: {stats['sources_processed']}/{stats['sources_total']}\n")
            f.write(f"! Total rules: {len(rules)}\n")
            f.write(f"! Deduplication rate: {stats['dedup_rate']:.1f}%\n")
            f.write(f"! Processing time: {stats['elapsed_time']:.2f}s\n")
            if stats.get('conflict_count', 0) > 0:
                f.write(f"! Conflicts detected: {stats['conflict_count']}\n")
            f.write("\n")
            
            for rule in rules:
                f.write(f"{rule}\n")
        
        print(f"Written {len(rules)} rules to {output_file}")
        
        # Generate detailed report
        reporter = MergeReporter(rules, stats)
        reporter.save_report('output/detailed_report.md', format='markdown')
        print("Generated detailed_report.md")
        
        # Generate text stats
        with open('output/stats.txt', 'w') as f:
            f.write(f"Total: {len(rules)}\n")
            f.write(f"Block: {stats['block_count']}\n")
            f.write(f"Allow: {stats['allow_count']}\n")
            f.write(f"Comment: {stats['comment_count']}\n")
            f.write(f"Deduplication: {stats['dedup_rate']:.1f}%\n")
            f.write(f"Time: {stats['elapsed_time']:.2f}s\n")
        
        # Set outputs
        with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
            f.write(f"total_rules={len(rules)}\n")
            f.write(f"dedup_rate={stats['dedup_rate']:.1f}\n")
            f.write(f"elapsed_time={stats['elapsed_time']:.2f}\n")
            f.write(f"conflict_count={stats.get('conflict_count', 0)}\n")
        EOF
      timeout-minutes: 10

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.date.outputs.date }}
        name: Filter Rules ${{ steps.date.outputs.date }}
        body: |
          ## Daily Filter Rules Update
          
          **Date:** ${{ steps.date.outputs.date }}
          **Workflow Run:** ${{ github.run_id }}
          
          ### Statistics
          - **Total Rules:** ${{ steps.generate.outputs.total_rules }}
          - **Deduplication Rate:** ${{ steps.generate.outputs.dedup_rate }}%
          - **Processing Time:** ${{ steps.generate.outputs.elapsed_time }}s
          - **Conflicts Detected:** ${{ steps.generate.outputs.conflict_count }}
          
          ### What's New
          - Optimized deduplication using Trie tree algorithm
          - Automatic conflict detection between block/allow rules
          - Support for multiple input formats (AdGuard, Hosts, plain domains)
          
          ### Files
          - `merged_rules.txt` - Merged filter rules
          - `detailed_report.md` - Detailed statistics report
          
          ### Usage
          Add this URL to your AdGuard Home:
          ```
          https://github.com/${{ github.repository }}/releases/download/v${{ steps.date.outputs.date }}/merged_rules.txt
          ```
        files: |
          output/merged_rules.txt
          output/detailed_report.md
          output/stats.txt
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update latest tag
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Create or update the 'latest' tag
        git tag -fa latest -m "Latest release ${{ steps.date.outputs.date }}"
        git push origin latest --force
