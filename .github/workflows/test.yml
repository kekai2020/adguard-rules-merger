# GitHub Actions Workflow for Testing
# This workflow runs on PRs and pushes to main branch

name: Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'merger/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'merger/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/test.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest-cov

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 merger/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 merger/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    - name: Run unit tests with pytest
      run: |
        pytest tests/ -v --tb=short

    - name: Run performance tests
      run: |
        python test_performance.py

    - name: Run concurrent tests
      run: |
        python test_concurrent.py

    - name: Generate coverage report
      run: |
        pytest tests/ --cov=merger --cov-report=xml --cov-report=term

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  integration-test:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Test real source fetching
      run: |
        python3 -c "
        from merger import RuleEngine
        
        # Test with a small real source
        engine = RuleEngine(timeout=30)
        sources = [
            'https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Base/filter.txt'
        ]
        
        print('Fetching real filter source...')
        rules = engine.merge(sources)
        print(f'Successfully fetched and merged {len(rules)} rules')
        
        # Verify we got some rules
        assert len(rules) > 0, 'Should have fetched some rules'
        print('✅ Integration test passed!')
        "
      timeout-minutes: 5

    - name: Test merge script
      run: |
        python merge_rules.py --sources https://raw.githubusercontent.com/StevenBlack/hosts/master/readme.md --output test_output.txt --verbose || true
        echo "Merge script test completed"
